name: PayBuddy Android CI & Appium Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch: # Allows manual trigger from the Actions tab

jobs:
  build-and-test:
    name: Run Appium UI Automation
    runs-on: macos-13

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'
          cache: 'gradle'

      - name: Create Mock google-services.json
        run: |
          mkdir -p app
          cat <<'EOF' > app/google-services.json
          {
            "project_info": {
              "project_number": "1234567890",
              "project_id": "mock-project",
              "storage_bucket": "mock-project.appspot.com"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:1234567890:android:mockapp12345",
                  "android_client_info": {
                    "package_name": "com.paybuddy"
                  }
                },
                "oauth_client": [],
                "api_key": [
                  {
                    "current_key": "mock-api-key"
                  }
                ],
                "services": {
                  "appinvite_service": {
                    "other_platform_oauth_client": []
                  }
                }
              }
            ],
            "configuration_version": "1"
          }
          EOF

      - name: Grant Execute Permission for Gradlew
        run: chmod +x gradlew

      - name: Build Android Debug APK
        run: ./gradlew assembleDebug

      - name: Verify APK Generated
        run: |
          ls -la app/build/outputs/apk/debug/app-debug.apk

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: Appium-Testing/package-lock.json

      - name: Install Appium & Test Dependencies
        run: |
          cd Appium-Testing
          npm ci

      - name: Run Appium Tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          profile: pixel
          disable-animations: true
          script: |
            cd Appium-Testing
            npm run test:all

      - name: Upload Excel Execution Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Appium-Excel-Execution-Report
          path: Appium-Testing/excel-reports/PayBuddy_Execution_Report.xlsx
          if-no-files-found: ignore

      - name: Upload Allure Test Reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: Appium-Allure-Results
          path: Appium-Testing/reports/allure-results/
          if-no-files-found: ignore

      - name: Upload Error Screenshots
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: Appium-Failure-Screenshots
          path: Appium-Testing/screenshots/
          if-no-files-found: ignore
